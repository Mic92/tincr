# cargo-nextest configuration
# https://nexte.st/docs/configuration/

[profile.default]
# Per-test timeout: a test is considered slow after this duration.
# After `terminate-after` periods, the test is killed.
slow-timeout = { period = "30s", terminate-after = 2 }

# CI profile: stricter, with JUnit output for CI integration
[profile.ci]
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false
retries = 1

[profile.ci.junit]
path = "junit.xml"
