# cargo-nextest configuration
# https://nexte.st/docs/configuration/

[profile.default]
# Per-test timeout: a test is considered slow after this duration.
# After `terminate-after` periods, the test is killed.
slow-timeout = { period = "30s", terminate-after = 2 }

# CI profile: stricter, with JUnit output for CI integration
[profile.ci]
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false
retries = 1

[profile.ci.junit]
path = "junit.xml"

# netns tests each spin up a bwrap sandbox + 2-3 tincd daemons; running
# many concurrently starves the rigs and causes ctl-connect resets.
[[profile.default.overrides]]
filter = 'binary(netns)'
threads-required = 8

[[profile.ci.overrides]]
filter = 'binary(netns)'
threads-required = 8

# throughput gate: 3× (setup ~3s + iperf3 5s + teardown) ≈ 30s
# wall-clock inside the bwrap inner. Outer wraps it; budget 2min.
[[profile.default.overrides]]
filter = 'test(rust_vs_c_throughput)'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(rust_vs_c_throughput)'
slow-timeout = { period = "180s", terminate-after = 2 }

# netns stress tests: each one builds the bwrap rig (~2s) then runs
# multi-second flap/idle/PMTU phases. Budget 90s; the slowest
# (link_flap, handshake_under_loss) take ~25-40s wall-clock.
[[profile.default.overrides]]
filter = 'test(stress::stress_)'
slow-timeout = { period = "90s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(stress::stress_)'
slow-timeout = { period = "120s", terminate-after = 2 }

# autoconnect_shortcut: 5-node rig + 30s flood-wait + ~45s EWMA decay.
[[profile.default.overrides]]
filter = 'test(autoconnect_shortcut)'
slow-timeout = { period = "90s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = 'test(autoconnect_shortcut)'
slow-timeout = { period = "120s", terminate-after = 2 }
